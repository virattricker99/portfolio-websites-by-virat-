services:
  - type: web
    name: rishu-thakur-portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    databases:
      - name: portfolio-db
        databaseName: portfolio_db
        user: portfolio_user
        plan: free
